<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#0f172a;
        font-family:Arial, sans-serif;
        color:white;
    }

    /* Navbar */

    nav{
        width:100%;
        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:20px 50px;

        background:#1e293b;

        position:fixed;
        top:0;
        left:0;
    }

    .logo{ 
        color:#38bdf8; 
        font-size:32px; 
    }

    ul{
        display:flex;
        gap:20px;
        list-style:none;
    }
.active{
    background:#38bdf8;
    color:#0f172a;
    font-weight:bold;
}
    ul li a{
        text-decoration:none;
        color:white;

        background:#0f172a;

        padding:10px 20px;

        border-radius:10px;

        transition:0.3s;
    }

    
    ul li a:hover{
        background:#38bdf8;
        color:black;
    }

    

    /* Contact Section */

    .contact-container{
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;
    }

    .contact-box{
        background:#1e293b;

        padding:50px;

        width:700px;

        border-radius:25px;

        text-align:center;

        box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    h1{
        font-size:50px;
        color:#38bdf8;

        margin-bottom:20px;
    }

    .contact-line{
        font-size:20px;
        color:#cbd5e1;

        margin-bottom:40px;
    }

    .info{
        display:flex;
        flex-direction:column;
        gap:25px;

        text-align:left;
    }

    .info div{
        background:#0f172a;

        padding:18px 25px;

        border-radius:15px;

        font-size:20px;
    }

    span{
        color:#38bdf8;
        font-weight:bold;
    }

</style>


</head>

<body>


<nav>

    <h1 class="logo">N.K.Prasanna</h1>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="project.html">Projects</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

</nav>

<section class="contact-container">

    <div class="contact-box">

        <h1>Contact Me</h1>

        <p class="contact-line">
            Feel free to connect with me through the platforms below.
        </p>

        <div class="info">

            <div>
                <span>Email :</span>
                prasannanimmala2006@gmail.com
            </div>

            <div>
                <span>Mobile :</span>
                8688272059
            </div>

           

        </div>

    </div>

</section>


</body>
</html>
